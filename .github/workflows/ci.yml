name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-scala:
    name: Scala build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Compile
        run: sbt compile

  test-lambda:
    name: Lambda tests
    runs-on: ubuntu-latest
    needs: build-scala
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 moto pytest

      - name: Run tests
        run: pytest src/test/scala/lambda
